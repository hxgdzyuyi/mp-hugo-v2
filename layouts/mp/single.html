{{ define "main" }}
  {{ $cover := .Params.cover | default .Params.cover_image }}
  {{ $location := .Params.location | default .Site.Params.wechatLocation | default "北京" }}
  <div id="js_article" style="position: relative;" class="rich_media">
    <div id="js_top_ad_area" class="top_banner" aria-hidden="true"></div>
    <div id="js_base_container" class="rich_media_inner">
      <div
        class="wx_row_immersive_stream_wrap"
        id="js_row_immersive_stream_wrap"
        {{ if not $cover }}style="display: none;"{{ end }}
        aria-hidden="true"
      >
        <div id="js_row_immersive_cover_img">
          {{ with $cover }}
            <img src="{{ . | safeURL }}" alt="cover_image" class="wx_follow_avatar_pic">
          {{ end }}
        </div>
        <div id="js_row_immersive_stream_mask" class="wx_row_immersive_stream_mask"></div>
      </div>
      <div id="page-content" class="rich_media_area_primary">
        <div class="rich_media_area_primary_inner">
          <div id="img-content" class="rich_media_wrp smartmd-article" style="width:578px;max-width:100%;margin:0 auto;">
            <h1 class="rich_media_title" id="activity-name">
              <span class="js_title_inner">{{ .Title }}</span>
            </h1>
            <div id="meta_content" class="rich_media_meta_list">
              <span id="meta_content_hide_info">
                <em id="publish_time" class="rich_media_meta rich_media_meta_text">
                  {{ .Date.Format "2006-01-02" }}
                </em>
                <em
                  id="js_ip_wording_wrp"
                  class="rich_media_meta rich_media_meta_text"
                  style="display: inline-block;"
                  aria-label="{{ $location }}"
                >
                  <span id="js_a11y_op_ip_wording" aria-hidden="true"></span>
                  <span aria-hidden="true" id="js_ip_wording">{{ $location }}</span>
                </em>
              </span>
            </div>
            <div
              class="rich_media_content js_underline_content autoTypeSetting24psection fix_apple_default_style"
              id="js_content"
            >
              {{ .Content }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
{{ end }}
