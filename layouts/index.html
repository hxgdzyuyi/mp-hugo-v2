<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Site.Title }}</title>
</head>
<body>
  <main>
    <h1>{{ .Site.Title }}</h1>
    <ul>
      {{ range .Site.RegularPages }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a> <small>{{ .Type }}</small></li>
      {{ end }}
    </ul>
  </main>
</body>
</html>
